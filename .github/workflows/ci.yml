name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Run clippy per-package to avoid cross-package feature conflicts
      - run: cargo clippy -p sibna-core --features p2p,pqc,argon2,ffi -- -D warnings
      - run: cargo clippy -p sibna-server -- -D warnings
      - run: cargo clippy -p sibna-tests -- -D warnings

  test-core:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib
      - run: cargo test --workspace --test integration_tests -- --skip test_mdns_discovery
      - run: cargo test --workspace --test multi_device_tests
      - run: cargo test --workspace --test integration

  test-attack:
    name: Security Audit Tests
    runs-on: ubuntu-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build the server binary first (attack_tests spawns it as a subprocess)
      - run: cargo build -p sibna-server
      - run: cargo test --workspace --test attack_tests
        env:
          SIBNA_JWT_SECRET: ${{ secrets.SIBNA_JWT_SECRET || 'ci_test_secret_for_audit_only_not_production' }}

  test-offensive:
    name: Offensive Tests
    runs-on: ubuntu-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --test offensive_test
      - run: cargo test --workspace --test advanced_offensive_test

  test-sdk-python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r sdks/python/requirements.txt
      - run: cd sdks/python && pip install -e . --no-deps && pytest tests/ -v

  test-sdk-javascript:
    name: JavaScript SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd sdks/javascript && npm install
      - run: cd sdks/javascript && npm test

  test-sdk-go:
    name: Go SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      # go mod tidy with vendor to avoid network issues during test
      - run: cd sdks/go && go test -v ./...

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check licenses sources bans

  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p sibna-core --features p2p,pqc,argon2,ffi
      - run: cargo build -p sibna-server
      - run: cargo build -p sibna-core --no-default-features
