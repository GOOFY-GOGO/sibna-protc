# cargo-deny configuration
# Run: cargo deny check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]

# ─── License policy ──────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
copyleft = "deny"
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
]
confidence-threshold = 0.8

# ─── Security advisories ─────────────────────────────
# SECURITY FIX §5.5: upgraded unmaintained from "warn" to "deny" so that
# CI fails (not just warns) when a dependency has no active maintainer.
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "workspace"
yanked = "deny"
notice = "warn"
ignore = [
    # RESOLVED: sled 0.34 replaced with redb (PATCH 23). Removed from dependency tree.
]

# ─── Dependency bans ─────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny = [
    # Insecure or unmaintained crypto — never allow, no exceptions
    { name = "md5"    },
    { name = "sha1"   },
    { name = "des"    },
    { name = "rc4"    },
    { name = "crypto" },
    # Avoid old rand versions (pre-0.8 had weak default RNG seeding)
    { name = "rand", version = "<0.8" },
    # bincode 1.x has known deserialization size-hint overflow — §5.4
    { name = "bincode", version = "<2.0" },
]
skip-tree = []

# ─── Source policy ───────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
