# cargo-deny configuration
# Run: cargo deny check
# Schema: cargo-deny v0.14+ with version = 2 opt-in (PR #611)

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]

# ─── License policy ──────────────────────────────────
# version = 2 opts into the new behavior where:
#   - copyleft defaults to "deny"
#   - the `deny` list is removed (use `allow` only)
#   - unlicensed defaults to "deny"
[licenses]
version = 2
private = { ignore = false }  # Don't fail on workspace-internal crates without license
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
exceptions = [
    # Compound SPDX expression used by some unicode-related crates
    { allow = ["Apache-2.0", "MIT"], crate = "zmij" },
]
confidence-threshold = 0.8

# ─── Security advisories ─────────────────────────────
# version = 2 opts into the new behavior where:
#   - vulnerability defaults to "deny"
#   - unmaintained defaults to "deny" (old default was "warn")
#   - unsound defaults to "deny" (old default was "warn")
#   - notice defaults to "deny" (old default was "warn")
#   - severity-threshold is no longer considered
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # RESOLVED: sled 0.34 replaced with redb (PATCH 23). Removed from dependency tree.
    # bincode 2.x is the actively maintained version (1.x is unmaintained).
    # We use bincode 2.0.1, not the deprecated 1.x line.
    "RUSTSEC-2025-0141",
]

# ─── Dependency bans ─────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny = [
    # Insecure or unmaintained crypto — never allow, no exceptions
    { name = "md5"    },
    { name = "des"    },
    { name = "rc4"    },
    { name = "crypto" },
    # Avoid old rand versions (pre-0.8 had weak default RNG seeding)
    { name = "rand", version = "<0.8" },
    # bincode 1.x has known deserialization size-hint overflow — §5.4
    { name = "bincode", version = "<2.0" },
]
# sha1 is banned as a direct dependency, but it's a transitive dep
# of axum/tungstenite (WebSocket stack). Skip it in the tree.
skip = [
    { name = "sha1" },
]
skip-tree = [
    # sha1 is pulled in transitively by axum/tungstenite WebSocket stack.
    # We don't use sha1 directly — it's only used internally by those crates.
    { name = "sha1" },
    # Path dependencies (sibna-core, sibna-server) don't have explicit versions
    { name = "sibna-core" },
    { name = "sibna-server" },
    { name = "sibna-tests" },
]

# ─── Source policy ───────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
